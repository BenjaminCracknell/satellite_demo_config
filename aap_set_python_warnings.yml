---
- name: Add the extra environment variable PYTHONWARNINGS to AAP controller
  hosts: localhost

  vars:
    controller_settings:
      AWX_TASK_ENV:
        PYTHONWARNINGS: "ignore:Unverified HTTPS request"
 #       value: '"PYTHONWARNINGS": "ignore:Unverified HTTPS request"'

  roles:
    - role: infra.controller_configuration.settings
      when: controller_settings is defined