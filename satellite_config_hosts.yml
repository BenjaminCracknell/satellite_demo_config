---
- hosts: localhost
#  connection: local

  name: Configure RHEL hosts for Remote Execution (REX) from Satellite
  gather_facts: no

  vars:
    login: &login
      server_url: "{{ lookup('env', 'SATELLITE_SERVER_URL') }}"
      username: admin
      password: "{{ lookup('env', 'SATELLITE_PASSWORD') }}"
      validate_certs: no

  tasks:

  - name: Verify where I am actually running
    ansible.builtin.command: hostname
    delegate_to: satellite
    register: check_location

  - name: Print location info
    ansible.builtin.debug:
      msg: "I am running on {{ check_location.stdout }} as {{ ansible_user }}"

  - name: Debug server_url
    ansible.builtin.debug:
      msg: "Sat url: {{ login.server_url }} user: {{ login.username }}"

  - name: Create a RHEL host collection
    theforeman.foreman.host_collection:
      <<: *login
      name: "All RHEL hosts collection"
      description: "All RHEL hosts regardless of Lifecycle Environment"
      organization: "Default Organization"
      state: present
  
  - name: Add hosts to host collection
    ansible.builtin.command: >
      hammer host-collection add-host
      --name "All RHEL hosts collection"
      --organization "Default Organization"
      --host "{{ item }}"
    delegate_to: satellite.example.com
    vars:
      ansible_user: "ec2-user"
    loop:
      - node1.example.com
      - node2.example.com
      - node3.example.com

  - name: Create a RHEL host group
    theforeman.foreman.hostgroup:
      name: "All RHEL hosts host group"
      state: present

  - name: Add hosts to host group
    theforeman.foreman.host:
      name: "{{ item }}"
      hostgroup: "All RHEL hosts host group"
      state: present
    loop:
      - node1.example.com
      - node2.example.com
      - node3.example.com
